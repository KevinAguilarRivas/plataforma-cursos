name: Build and Deploy - Plataforma Cursos

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Paso 1: Checkout del repositorio
      - name: Checkout repository
        uses: actions/checkout@v3

      # Paso 2: Autenticar en DockerHub
      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Paso 3: Construir la imagen Docker
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/cursos-app:latest .

      # Paso 4: Hacer push de la imagen a DockerHub
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/cursos-app:latest

      # Paso 5: Configurar credenciales AWS
      - name: Set up AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}

      # Paso 5.5: Agregar clave SSH
      - name: Add SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      # Paso 6: Generar application.yml con los valores de Azure AD B2C
      # IMPORTANTE: Cada vez que enciendas el laboratorio se debe refrescar
      # los secrets de AWS en GitHub (AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_SESSION_TOKEN)
      # Los secrets de Azure (AZURE_ISSUER_URI, AZURE_JWK_SET_URI) son permanentes.
      - name: Generate application.yml
        run: |
          cat > src/main/resources/application.yml << 'YAMEOF'
          spring:
            application:
              name: cursos
            security:
              oauth2:
                resourceserver:
                  jwt:
                    issuer-uri: ${{ secrets.AZURE_ISSUER_URI }}
                    jwk-set-uri: ${{ secrets.AZURE_JWK_SET_URI }}
            rabbitmq:
              host: ${{ secrets.RABBITMQ_HOST }}
              port: ${{ secrets.RABBITMQ_PORT }}
              username: ${{ secrets.RABBITMQ_USER }}
              password: ${{ secrets.RABBITMQ_PASSWORD }}
            datasource:
              url: ${{ secrets.ORACLE_DB_URL }}
              username: ${{ secrets.ORACLE_DB_USER }}
              password: ${{ secrets.ORACLE_DB_PASSWORD }}
              driver-class-name: oracle.jdbc.OracleDriver
            jpa:
              hibernate:
                ddl-auto: update
              properties:
                hibernate:
                  dialect: org.hibernate.dialect.OracleDialect
              show-sql: true
          cloud:
            aws:
              credentials:
                access-key: ${{ secrets.AWS_ACCESS_KEY_ID }}
                secret-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                session-token: ${{ secrets.AWS_SESSION_TOKEN }}
              region:
                static: us-east-1
              s3:
                enabled: true
          app:
            s3:
              bucket: ${{ secrets.S3_BUCKET_NAME }}
            efs:
              path: /app/efs
          server:
            port: 8080
          YAMEOF

      # Paso 7: Conectarse a EC2 y desplegar con EFS montado
      - name: SSH commands to deploy
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ${{ secrets.USER_SERVER }}@${{ secrets.EC2_HOST }} << 'EOF'
            echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/cursos-app:latest

            # Red compartida entre el backend y RabbitMQ
            docker network create cursos-net || true

            # RabbitMQ (cola 1 y cola 2 viven aqui, se crean automaticamente al iniciar el backend)
            docker stop rabbitmq || true && docker rm rabbitmq || true
            docker run -d \
              --name rabbitmq \
              --network cursos-net \
              -p 5672:5672 \
              -p 15672:15672 \
              -e RABBITMQ_DEFAULT_USER="${{ secrets.RABBITMQ_USER }}" \
              -e RABBITMQ_DEFAULT_PASS="${{ secrets.RABBITMQ_PASSWORD }}" \
              rabbitmq:3-management

            docker stop cursos-app || true && docker rm cursos-app || true
            docker run -d \
              --name cursos-app \
              --network cursos-net \
              -v /mnt/efs:/app/efs \
              -p 8080:8080 \
              -e AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
              -e AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
              -e AWS_SESSION_TOKEN="${{ secrets.AWS_SESSION_TOKEN }}" \
              -e S3_BUCKET_NAME="${{ secrets.S3_BUCKET_NAME }}" \
              -e AZURE_ISSUER_URI="${{ secrets.AZURE_ISSUER_URI }}" \
              -e AZURE_JWK_SET_URI="${{ secrets.AZURE_JWK_SET_URI }}" \
              -e RABBITMQ_HOST=rabbitmq \
              -e RABBITMQ_PORT=5672 \
              -e RABBITMQ_USER="${{ secrets.RABBITMQ_USER }}" \
              -e RABBITMQ_PASSWORD="${{ secrets.RABBITMQ_PASSWORD }}" \
              -e ORACLE_DB_URL="${{ secrets.ORACLE_DB_URL }}" \
              -e ORACLE_DB_USER="${{ secrets.ORACLE_DB_USER }}" \
              -e ORACLE_DB_PASSWORD="${{ secrets.ORACLE_DB_PASSWORD }}" \
              "${{ secrets.DOCKERHUB_USERNAME }}/cursos-app:latest"
          EOF
